<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JULIA V5.1 - STABLE</title>
    <style>
        body { margin: 0; background: #000; color: #00e5ff; font-family: sans-serif; overflow: hidden; height: 100vh; transition: background 0.5s ease; }
        #lock-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #julia-main { display: none; width: 100vw; height: 100vh; position: fixed; inset: 0; }
        #avatar-container { width: 100%; height: 70vh; display: flex; justify-content: center; align-items: center; }
        #avatar-img { height: 85%; width: auto; object-fit: contain; transition: transform 0.5s ease; }
        
        #terminal { position: absolute; bottom: 30px; left: 10px; right: 10px; text-align: center; color: #fff; padding: 15px; border: 1px solid #00e5ff; border-radius: 10px; background: rgba(0,0,0,0.8); }
        
        .rotate-360 { animation: spin360 1s ease-in-out; }
        @keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .swing { animation: swingMotion 2s infinite ease-in-out; }
        @keyframes swingMotion { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <input type="text" id="pass" placeholder="Enter Access Phrase">
        <button onclick="checkAccess()" style="padding:15px 30px; background:#00e5ff; border:none; border-radius:10px;">ACTIVATE</button>
    </div>

    <div id="julia-main">
        <div id="avatar-container">
            <img id="avatar-img" src="https://i.postimg.co/N08gYgWh/julia-avatar.png">
        </div>
        <div id="terminal">Julia Initialized...</div>
    </div>

    <script>
        const GROQ_KEY = "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";
        const avatar = document.getElementById('avatar-img');
        const term = document.getElementById('terminal');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';

        function checkAccess() {
            if(document.getElementById('pass').value.trim() === "Julia i u online") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('julia-main').style.display = 'block';
                document.documentElement.requestFullscreen();
                speak("Access granted, Vishal sir.");
            }
        }

        function speak(text) {
            term.innerText = text;
            let u = new SpeechSynthesisUtterance(text);
            u.lang = 'hi-IN';
            u.onend = () => {
                term.innerText = "Listening... (Boliye Vishal Sir)";
                recognition.start();
            };
            window.speechSynthesis.speak(u);
        }

        recognition.onresult = async (e) => {
            let t = e.results[0][0].transcript;
            term.innerText = "You: " + t;
            
            // Emotion Logic
            if(t.includes("gussa")) avatar.className = 'rotate-360';
            else if(t.includes("khush")) avatar.className = 'swing';
            else avatar.className = '';

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: t }] })
            });
            const data = await res.json();
            speak(data.choices[0].message.content);
        };
    </script>
</body>
</html>
