<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JULIA V5.0 - DYNAMIC</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #00e5ff; font-family: sans-serif; overflow: hidden; height: 100vh; transition: background 1s ease; }
        
        #lock-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; border-radius: 10px; border: 2px solid #00e5ff; background: #111; color: #fff; text-align: center; margin-bottom: 10px; width: 80%; }
        
        #julia-main { display: none; width: 100vw; height: 100vh; position: fixed; inset: 0; }
        #avatar-container { width: 100%; height: 70vh; display: flex; justify-content: center; align-items: center; }
        
        #avatar-img { 
            height: 80%; width: auto; object-fit: contain; 
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Animations */
        .rotate-360 { animation: spin360 1s ease-in-out; }
        @keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .swing { animation: swingMotion 2s infinite ease-in-out; }
        @keyframes swingMotion { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

        .mood-angry { background: radial-gradient(circle, #500, #000); }
        .mood-happy { background: radial-gradient(circle, #303, #000); }
        .mood-neutral { background: #000; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <input type="text" id="pass" placeholder="Enter Access Phrase">
        <button onclick="checkAccess()" style="padding:15px 30px; background:#00e5ff; border:none; border-radius:10px;">ACTIVATE</button>
    </div>

    <div id="julia-main">
        <div id="avatar-container">
            <img id="avatar-img" src="https://i.postimg.co/N08gYgWh/julia-avatar.png">
        </div>
        <div id="terminal" style="text-align:center; color:#fff; padding:20px; font-weight:bold;">Julia Online</div>
    </div>

    <script>
        const GROQ_KEY = "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";
        const avatar = document.getElementById('avatar-img');

        function checkAccess() {
            if(document.getElementById('pass').value.trim() === "Julia i u online") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('julia-main').style.display = 'block';
                document.documentElement.requestFullscreen();
                speak("Access granted, Vishal sir.");
            }
        }

        function setEmotion(text) {
            const body = document.body;
            avatar.className = ''; // Reset
            
            if(text.includes("gussa") || text.includes("angry")) {
                body.className = 'mood-angry';
                avatar.classList.add('rotate-360');
            } else if(text.includes("khush") || text.includes("happy")) {
                body.className = 'mood-happy';
                avatar.classList.add('swing');
            } else {
                body.className = 'mood-neutral';
            }
        }

        function speak(text) {
            setEmotion(text);
            let u = new SpeechSynthesisUtterance(text);
            u.lang = 'hi-IN';
            window.speechSynthesis.speak(u);
        }

        // Logic for AI connection
        async function askJulia(prompt) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: prompt }] })
            });
            const data = await res.json();
            speak(data.choices[0].message.content);
        }
    </script>
</body>
</html>
