<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JULIA OFFICIAL - VISHAL SIR</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* New Permission Layer */
        #setup-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .start-btn { padding: 20px 40px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #00e5ff; font-size: 1.2rem; }

        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .master-input { background: #111; border: 1px solid #00e5ff; color: #fff; padding: 15px; border-radius: 10px; width: 75%; text-align: center; margin-top: 20px; font-size: 1.1rem; outline: none; }
        
        #julia-main { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        
        #terminal {
            position: absolute; bottom: 8%; left: 5%; right: 5%; z-index: 10;
            background: rgba(0,0,0,0.85); padding: 20px; border-radius: 20px;
            border: 2px solid #00e5ff; text-align: center;
        }
        .active-glow { border-color: #00e5ff !important; box-shadow: 0 0 25px #00e5ff; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="margin-bottom: 30px;">SYSTEM INITIALIZING</h1>
        <button class="start-btn" onclick="requestFullAccess()">ACTIVATE JULIA PROTOCOL</button>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">Required: Microphone & Camera Access</p>
    </div>

    <div id="lock-screen">
        <h2 id="lock-status">SECURITY VERIFICATION</h2>
        <input type="password" id="masterCode" class="master-input" placeholder="Enter Master Phrase..." onkeydown="if(event.key==='Enter') verifyAndUnlock()">
        <p style="font-size: 0.8rem; margin-top: 15px; opacity: 0.6;">Hint: julia i u online</p>
    </div>

    <div id="julia-main">
        <img id="avatar-img" src="https://i.ibb.co/L6K6J8m/1000015763.jpg">
        <div id="terminal">
            <div id="typed-text">Julia in Sleep Mode... (Clap to Wake)</div>
        </div>
    </div>

    <script>
        let globalStream;
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.continuous = true;

        // Force Popup on Button Click
        async function requestFullAccess() {
            try {
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'flex';
            } catch (err) {
                alert("Vishal sir, please 'Allow' permission de dein warna system load nahi hoga.");
            }
        }

        async function verifyAndUnlock() {
            const code = document.getElementById('masterCode').value.toLowerCase();
            if(code === "julia i u online") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('julia-main').style.display = 'block';
                setupClapDetection(globalStream);
                speak("Julia is online. Welcome back Vishal sir! Main sleep mode mein hoon, wake up karne ke liye clap kijiye.");
            } else {
                alert("Security Breach! Access Denied.");
            }
        }

        // Rest of the Logic (Clap, Speak, Recognition)
        function setupClapDetection(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            
            function checkClap() {
                analyser.getByteFrequencyData(data);
                let volume = data.reduce((a, b) => a + b) / data.length;
                if (volume > 40) { wakeUp(); }
                requestAnimationFrame(checkClap);
            }
            checkClap();
        }

        function wakeUp() {
            document.getElementById('terminal').classList.add('active-glow');
            speak("Yes Vishal sir! I am awake. Boliye main aapki kya help kar sakti hoon?");
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            msg.onend = () => { startListening(); };
            window.speechSynthesis.speak(msg);
            document.getElementById('typed-text').innerText = text;
        }

        function startListening() {
            try { recognition.start(); } catch(e) {}
        }

        recognition.onresult = (event) => {
            const cmd = event.results[event.results.length - 1][0].transcript.toLowerCase();
            document.getElementById('typed-text').innerText = "Command: " + cmd;
            if(cmd.includes("kaise ho")) speak("Main ekdam fit hoon sir!");
            else speak("Ji sir, maine suna: " + cmd);
        };
    </script>
</body>
</html>
