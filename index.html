<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JULIA - VISHAL SIR</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* Fast Unlock Screen */
        #lock-screen { 
            position: fixed; inset: 0; background: #000; z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .glow-btn {
            padding: 15px 40px; border: 2px solid #00e5ff; background: transparent;
            color: #00e5ff; font-size: 1.2rem; border-radius: 30px; cursor: pointer;
            box-shadow: 0 0 15px #00e5ff; transition: 0.3s;
        }

        /* Full Screen Avatar for Redmi 12 5G */
        #julia-main { 
            display: none; width: 100%; height: 100%; 
            background: url('https://i.ibb.co/L6K6J8m/1000015763.jpg') no-repeat center center;
            background-size: cover; position: fixed; top: 0; left: 0;
        }
        
        #terminal {
            position: absolute; bottom: 8%; left: 5%; right: 5%;
            background: rgba(0,0,0,0.85); padding: 18px; border-radius: 15px;
            border: 1px solid #00e5ff; text-align: center; font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="margin-bottom: 30px;">VISHAL SIR DETECTED</h1>
        <button class="glow-btn" onclick="unlockJulia()">UNLOCK JULIA</button>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.7;">Camera & Audio Active</p>
    </div>

    <div id="julia-main">
        <div id="terminal">
            <div id="typed-text">Julia is ready...</div>
        </div>
    </div>

    <script>
        // Automatic Camera/Mic Access for Redmi 12 5G
        async function requestPermissions() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            } catch(e) { console.log("Redmi permission needed"); }
        }
        requestPermissions();

        function unlockJulia() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('julia-main').style.display = 'block';
            
            // Julia Speaks in Hinglish
            const welcomeText = "Julia is online. Welcome back Vishal sir! Aapka avatar ab ready hai. System fully operational ho chuka hai. Main aapki kya help kar sakti hoon?";
            juliaSpeak(welcomeText);
        }

        function juliaSpeak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN'; // Hindi voice with English words support
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
            
            // Typing effect
            let i = 0;
            const target = document.getElementById('typed-text');
            target.innerHTML = "";
            let interval = setInterval(() => {
                if (i < text.length) { target.innerHTML += text.charAt(i); i++; }
                else { clearInterval(interval); }
            }, 45);
        }
    </script>
</body>
</html>
